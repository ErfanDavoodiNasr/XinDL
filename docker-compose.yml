version: '3.8'

services:
  bot:
    build:
      context: .
    container_name: xindl_bot
    restart: unless-stopped
    command: python -m src.bot.main
    env_file:
      - .env
    volumes:
      - downloads_data:/app/downloads
      - ./cookies.txt:/app/cookies/cookies.txt:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    depends_on:
      - telegram-bot-api

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: xindl_tg_api
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - downloads_data:/app/downloads
      - tg_api_data:/var/lib/telegram-bot-api

volumes:
  downloads_data:
  tg_api_data:
