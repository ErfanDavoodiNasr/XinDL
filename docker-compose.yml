services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: xindl_tg_api
    restart: unless-stopped
    network_mode: host
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - downloads_data:/app/downloads
      - ./data/telegram-bot-api:/var/lib/telegram-bot-api
    user: "0:0"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /var/lib/telegram-bot-api /tmp/telegram-bot-api
        while true; do
          find /tmp/telegram-bot-api -type f -mmin +10 -delete 2>/dev/null || true
          sleep 300
        done &
        exec telegram-bot-api \
          --api-id="$$TELEGRAM_API_ID" \
          --api-hash="$$TELEGRAM_API_HASH" \
          --local \
          --http-port=8081 \
          --dir=/var/lib/telegram-bot-api \
          --temp-dir=/tmp/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  bot:
    build:
      context: .
      network: host
    image: xindl-bot
    container_name: xindl_bot
    restart: unless-stopped
    network_mode: host
    command: python -m src.bot.main
    env_file:
      - .env
    environment:
      TELEGRAM_LOCAL_API_URL: http://127.0.0.1:8081
      AUTO_TUNE_RESOURCES: "true"
    volumes:
      - downloads_data:/app/downloads
      - ./cookies:/app/cookies
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    depends_on:
      telegram-bot-api:
        condition: service_healthy

volumes:
  downloads_data:
